id: guild-quest
name: "Guild Quests"
version: 1.0.0
author: GuildPlugin-Team
description: "Guild quest system - accept quests, track progress, claim rewards"
main: com.guild.module.example.quest.GuildQuestModule
api-version: 1.6.6
type: functional
config-prefix: quest

settings:
  max-daily-quests: 3
  max-weekly-quests: 2
  quest-reset-hour: 4
  auto-save-interval-minutes: 10

rewards:
  default-contribution-per-quest: 50
  default-money-reward: 100
  enable-exp-reward: true
