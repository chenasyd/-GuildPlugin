# Database configuration file

# Database type: mysql or sqlite
type: sqlite

# MySQL configuration (used when type is mysql)
mysql:
  # Database host
  host: localhost
  # Database port
  port: 3306
  # Database name
  database: guild
  # Database username
  username: root
  # Database password
  password: ""
  # Connection pool size
  pool-size: 10
  # Minimum idle connections
  min-idle: 5
  # Connection timeout (milliseconds)
  connection-timeout: 30000
  # Idle timeout (milliseconds)
  idle-timeout: 600000
  # Maximum connection lifetime (milliseconds)
  max-lifetime: 1800000
  # Whether to use SSL
  use-ssl: false
  # Character encoding
  character-encoding: UTF-8
  # Timezone
  timezone: UTC

# SQLite configuration (used when type is sqlite)
sqlite:
  # Database file path (relative to the plugin data folder)
  file: guild.db
  # Whether to enable WAL mode
  wal-mode: true
  # Synchronous mode: OFF, NORMAL, FULL
  synchronous: NORMAL
  # Cache size (KB)
  cache-size: 2000
  # Page size (bytes)
  page-size: 4096
  # Whether to enable foreign key constraints
  foreign-keys: true

# Connection pool configuration
connection-pool:
  # Maximum pool size
  maximum-pool-size: 10
  # Minimum idle connections
  minimum-idle: 5
  # Connection timeout (milliseconds)
  connection-timeout: 30000
  # Idle timeout (milliseconds)
  idle-timeout: 600000
  # Maximum connection lifetime (milliseconds)
  max-lifetime: 1800000
  # Connection test query
  connection-test-query: "SELECT 1"
  # Validation timeout (milliseconds)
  validation-timeout: 5000
  # Whether to validate connections on pool start
  validate-on-start: true

# Database table configuration
tables:
  # Guilds table
  guilds:
    name: guilds
    # Whether to auto-create the table
    auto-create: true
    # Table structure version
    version: 1
  
  # Guild members table
  guild_members:
    name: guild_members
    auto-create: true
    version: 1
  
  # Guild applications table
  guild_applications:
    name: guild_applications
    auto-create: true
    version: 1
  
  # Guild invites table
  guild_invites:
    name: guild_invites
    auto-create: true
    version: 1

# Backup configuration
backup:
  # Whether to enable automatic backup
  enabled: false
  # Backup interval (hours)
  interval: 24
  # Backup retention (days)
  retention-days: 7
  # Backup file path
  path: "backups/"
  # Backup file format
  format: "yyyy-MM-dd_HH-mm-ss"
