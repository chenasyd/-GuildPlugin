# ============================================================
# 模块语言全局配置
# ============================================================
# 控制所有公会模块（announcement / member-rank / quest / stats 等）的默认语言。
# 模块消息文件位于 lang/modules/{模块目录}/{语言}.yml
#
# 此配置与插件本体（config.yml 的 language.default）完全独立。
# 插件本体语言用于 core/gui 消息，模块语言仅用于模块消息。
# 两者在启动和重载时各自独立加载，互不影响。
#
# 内置语言: en (English), zh (中文), pl (Polski), br (Português-BR)
# ============================================================

language:
  # 模块默认语言
  # 若未设置或对应语言文件不存在，回退到 "en"
  default: "en"
