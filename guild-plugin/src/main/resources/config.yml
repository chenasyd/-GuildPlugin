# GuildPlugin main configuration file

# Guild configuration
guild:
  # Minimum guild name length
  min-name-length: 3
  # Maximum guild name length
  max-name-length: 20
  # Maximum guild tag length
  max-tag-length: 6
  # Maximum guild description length
  max-description-length: 100
  # Maximum members per guild
  max-members: 50
  # Cost to create a guild (requires Vault)
  creation-cost: 1000.0
  # Teleport countdown in seconds (0 = instant, no delay)
  home-teleport-delay: 0
  # No-economy mode: set to true to skip economy checks when no economy plugin (e.g. Vault) is installed
  no-economy-mode: false
  # Guild tag color
  tag-color: "&6"
  # Guild name color
  name-color: "&e"
  # Level system configuration
  # max-level: Maximum level (no further levels beyond this)
  # levels: Funds required to reach the next level (key = current level)
  max-level: 10
  levels:
    1: 5000.0
    2: 10000.0
    3: 20000.0
    4: 35000.0
    5: 50000.0
    6: 75000.0
    7: 100000.0
    8: 150000.0
    9: 200000.0

# Display configuration
display:
  # Role colors (customizable)
  role-colors:
    leader: "&6"    # Leader: gold
    officer: "&b"   # Officer: aqua
    member: "&7"    # Member: gray
  # Role separator configuration
  role-separator:
    enabled: true
    text: " | "
    color-per-role: true      # Whether the separator follows the role color
    default-color: "&7"       # Default color when no role or not in a guild

# Permission configuration
permissions:
  # Default permissions
  default:
    can-create: true         # Allow creating a guild (when not in one)
    can-invite: false        # Non-members cannot invite by default
    can-kick: false          # Non-members cannot kick by default
    can-promote: false       # Non-members cannot promote by default
    can-demote: false        # Non-members cannot demote by default
    can-delete: false        # Non-members cannot delete by default
  
  # Leader permissions (if omitted, all are granted)
  leader:
    can-create: true
    can-invite: true
    can-kick: true
    can-promote: true
    can-demote: true
    can-delete: true

  # Officer permissions
  officer:
    can-create: true         # Allow deputy operations and creation
    can-invite: true
    can-kick: true
    can-promote: false       # Whether to allow promoting members (usually leader only)
    can-demote: false        # Whether to allow demoting members (usually leader only)
    can-delete: false        # Whether to allow deleting the guild (usually leader only)
  
  # Member permissions
  member:
    can-create: true         # Allow creating a new guild after leaving
    can-invite: false
    can-kick: false
    can-promote: false
    can-demote: false
    can-delete: false

# Language configuration
language:
  # Default language (must match the language code in messages_xx.yml)
  # Built-in languages: en (English), zh (Chinese), pl (Polish), br (Brazilian Portuguese)
  # You can add any language by placing the corresponding messages_xx.yml file in the plugin directory
  # Example: to add French, create messages_fr.yml and set default to "fr"
  default: "en"
  # Whether players can switch languages
  allow-player-switch: true
  # Additional language list (for loading languages by code from the plugin data folder or bundled resources)
  # The plugin automatically scans the data directory for language files under lang/core/, lang/gui/, and lang/modules/
  # This list is used to attempt loading these languages at startup.
  # Example: ["de", "fr", "es", "ja"]
  additional-languages: []

# Message configuration
messages:
  # Whether messages are enabled
  enabled: true
  # Message prefix
  prefix: "&6[Guild] &r"
  # Message colors
  colors:
    success: "&a"
    error: "&c"
    info: "&e"
    warning: "&6"

# GUI configuration
gui:
  # Whether GUI is enabled
  enabled: true
  # GUI title
  title: "&6Guild System"
  # GUI size (must be a multiple of 9)
  size: 54
  # Whether to show the guild tag
  show-tag: true
  # Whether to show the guild description
  show-description: true

# Guild chat configuration
guild-chat:
  enabled: true
  format: "&7[&bGuild&7]&r {role} {player}&f: {message}"
  role-leader: "&c&lLeader"
  role-officer: "&6Officer"
  role-member: "&aMember"
  offline-cache-size: 20
  allow-color-codes: true

# Placeholder configuration
placeholders:
  # Whether placeholders are enabled
  enabled: true
  # Placeholder prefix
  prefix: "guild_"
  # Whether to cache placeholders
  cache-enabled: true
  # Cache time (seconds)
  cache-time: 30

# Logging configuration
logging:
  # Whether logging is enabled
  enabled: true
  # Log level: DEBUG, INFO, WARN, ERROR
  level: INFO
  # Whether to log to file
  file-logging: true
  # Log file path
  log-file: "logs/guild.log"
  # Maximum log file size (MB)
  max-file-size: 10
  # Number of log files to retain
  max-files: 5

# Developer mode
developer-mode:
  # Enable developer mode (required to use custom module repositories)
  enabled: false
  # External module repositories (only used when developer mode is enabled)
  # Each repository needs a unique name (alias) and an API URL
  # The built-in official repository is always available and cannot be modified
  # Example:
  # repositories:
  #   - name: "My Repository"
  #     api: "https://api.github.com/repos/your-username/your-repo/releases"
  #   - name: "Community Repo"
  #     api: "https://api.github.com/repos/community/repo/releases"
  repositories: []
