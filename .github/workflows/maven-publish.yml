name: Build Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run tests
      run: mvn -B test

    - name: Build with Maven
      run: mvn -B package -DskipTests -Pbuild-announcement-module,build-api-test-module

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GuildPlugin-${{ github.sha }}
        path: |
          guild-plugin/target/guild-plugin-*.jar
          guild-plugin/target/modules/*.jar
          guild-sdk/target/guild-sdk-*.jar
        retention-days: 30

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          guild-plugin/target/*.jar
          guild-plugin/target/modules/*.jar
          guild-sdk/target/*.jar
