name: Build Example Modules

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]
  workflow_dispatch:

jobs:
  build-modules:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build entire project
      run: mvn clean install -DskipTests

    - name: Build Announcement Module
      run: mvn package -f guild-plugin/pom.xml -Pbuild-announcement-module -DskipTests

    - name: Build API Test Module
      run: mvn package -f guild-plugin/pom.xml -Pbuild-api-test-module -DskipTests

    - name: Upload module artifacts
      uses: actions/upload-artifact@v4
      with:
        name: GuildPlugin-Modules-${{ github.sha }}
        path: |
          guild-plugin/target/modules/*.jar
        retention-days: 30

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          guild-plugin/target/modules/*.jar
