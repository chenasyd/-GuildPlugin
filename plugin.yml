name: GuildPlugin
version: ${guild.version}
main: com.guild.GuildPlugin
api-version: '1.21'
authors: [chenasyd]
description: A feature-complete Minecraft guild/faction system supporting Spigot and Folia
website: https://github.com/chenasyd
softdepend: [PlaceholderAPI, Vault]

load: POSTWORLD
folia-supported: true

commands:
  guild:
    description: Main guild command and GUI
    usage: /guild help
    aliases: [g, 工会]
    permission: guild.use
  guildadmin:
    description: Guild admin commands and GUI
    usage: /guildadmin help
    aliases: [ga, 工会管理]
    permission: guild.admin
  guildmodule:
    description: Hot-load/unload modules at runtime
    usage: /guildmodule list
    aliases: [gm]
    permission: guild.admin.module

permissions:
  guild.use:
    description: Allows using the guild system
    default: true
  guild.admin:
    description: Guild administrator privileges
    default: op
  guild.create:
    description: Allows creating a guild
    default: true
  guild.invite:
    description: Allows inviting players to join the guild
    default: true
  guild.kick:
    description: Allows kicking guild members
    default: true
  guild.promote:
    description: Allows promoting guild members
    default: true
  guild.demote:
    description: Allows demoting guild members
    default: true
  guild.delete:
    description: Allows deleting the guild
    default: op
  guild.sethome:
    description: Allows setting the guild home
    default: true
  guild.home:
    description: Allows teleporting to the guild home
    default: true
  guild.relation:
    description: Allows managing guild relations
    default: true
  guild.economy:
    description: Allows managing guild economy
    default: true
  guild.deposit:
    description: Allows depositing funds to the guild
    default: true
  guild.withdraw:
    description: Allows withdrawing funds from the guild
    default: true
  guild.transfer:
    description: Allows transferring funds to other guilds
    default: true
  guild.admin.module:
    description: Allows managing modules (list/load/unload/reload)
    default: op
  guild.admin.update:
    description: Allows downloading and installing plugin updates
    default: op
